<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PicDuel</title>
    <link rel="icon" href="images/football-players/football-icon.svg">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <section id="introScreen">
        <img id="introLogo" src="images/football-players/football-icon.svg" alt="PicDuel Logo">
        <h1 id="introTitle">PicDuel</h1>
    </section>

    <section id="menuScreen" class="hidden">
        <div class="menuContainer">
            <img id="menuLogo" src="images/football-players/football-icon.svg" alt="PicDuel logo">
            <h1>PicDuel</h1>

            <div class="modeContainer">
                <button id="classicModeButton" type="button">👥 Classic</button>
                <button id="tournamentModeButton" type="button">🏆 Tournament</button>
            </div>

            <div class="playersContainer">
                <input id="player1Input" type="text" maxlength="20" placeholder="Player 1">
                <input id="player2Input" type="text" maxlength="20" placeholder="Player 2">
            </div>

            <div class="optionsContainer">
                <label>
                    Category
                    <select id="categorySelect"></select>
                </label>

                <label>
                    Difficulty
                    <select id="difficultySelect">
                        <option value="easy">Easy</option>
                        <option value="medium">Medium</option>
                        <option value="hard">Hard</option>
                        <option value="mixed">Mixed</option>
                    </select>
                </label>

                <label>
                    Time
                    <select id="timeSelect">
                        <option value="30">30"</option>
                        <option value="45">45"</option>
                        <option value="60" selected>60"</option>
                        <option value="90">90"</option>
                        <option value="120">120"</option>
                    </select>
                </label>
            </div>

            <div class="buttonsContainer">
                <button id="statisticsButton" type="button">📊 Statistics</button>
                <button id="achievementsButton" type="button">🏅 Achievements</button>
                <button id="settingsButton" type="button">⚙️ Settings</button>
            </div>

            <button id="startGameButton" type="button">▶ START GAME</button>
        </div>
    </section>

    <section id="gameScreen" class="hidden">
        <header id="gameHeader">
            <div id="player1Card" class="playerCard">
                <h2 id="player1Name">Player 1</h2>
                <span id="player1Timer">60</span>
            </div>

            <div id="categoryName">
                <h2 id="currentCategory">Category</h2>
            </div>

            <div id="player2Card" class="playerCard">
                <h2 id="player2Name">Player 2</h2>
                <span id="player2Timer">60</span>
            </div>
        </header>

        <main id="gameMain">
            <img id="gameImage" src="" alt="Football player image">
            <div id="messageBox">Type the name of the player you see!</div>

            <div id="answerForm"></div>

            <p id="turnHint">Turn: Player 1</p>
        </main>
    </section>

    <section id="winnerScreen" class="hidden">
        <div class="winnerContainer">
            <h1 id="winnerTitle">🏆 WINNER</h1>
            <h2 id="winnerName"></h2>
            <p id="winnerDescription"></p>
            <button id="playAgainButton" type="button">🔄 Play Again</button>
            <button id="backToMenuButton" type="button">🏠 Main Menu</button>
        </div>
    </section>

    <script src="categories.js"></script>
    <script src="game.js"></script>
</body>

</html>
